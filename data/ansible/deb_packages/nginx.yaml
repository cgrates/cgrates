---
- name: Add {{ nginx_server_name }} vhost in nginx
  become: true
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_server_name }}.vhost"
    mode: "0600"
    owner: "{{ rootUser }}"

- name: Create a symlink for {{ nginx_server_name }}
  become: true
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ nginx_server_name }}.vhost"
    dest: "/etc/nginx/sites-enabled/{{ nginx_server_name }}.vhost"
    state: link

- name: Restart the nginx so the change take effects
  become: true
  ansible.builtin.command: "/etc/init.d/nginx reload"
