#!KAMAILIO

#!ifndef CR_CONFIG_FILE
#!define CR_CONFIG_FILE "/etc/kamailio/carrierroute.config"
#!endif

####### Global Parameters #########

debug=2
log_stderror=yes

listen=udp:127.0.0.1:5060
fork=yes
children=2

####### Modules Section ########

loadmodule "kex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "evapi.so"
loadmodule "json.so"
loadmodule "dialog.so"
loadmodule "carrierroute.so"

# ----- module params -----

modparam("evapi", "bind_addr", "127.0.0.1:8448")
modparam("tm", "fr_inv_timer", 120000)
modparam("carrierroute", "config_source", "file")
modparam("carrierroute", "config_file", CR_CONFIG_FILE)

####### Routing Logic ########

event_route[evapi:message-received] {
	json_get_field("$evapi(msg)", "Event", "$var(Event)");
	route($(var(Event){s.rm,"}));
}

event_route[dialog:end] {
	route(CGR_PROCESS_CDR);
}

request_route {
	if (!mf_process_maxfwd_header("10")) {
		sl_send_reply("483", "Too Many Hops");
		exit;
	}

	if (is_method("CANCEL")) {
		if (t_check_trans()) {
			route(RELAY);
		}
		exit;
	}

	if (has_totag()) {
		if (loose_route()) {
			route(RELAY);
			exit;
		}
		if (is_method("ACK")) {
			if (t_check_trans()) {
				route(RELAY);
				exit;
			}
			exit;
		}
		sl_send_reply("404", "Not here");
		exit;
	}

	if (!is_method("INVITE")) {
		sl_send_reply("405", "Method Not Allowed");
		exit;
	}

	if (t_precheck_trans()) {
		t_check_trans();
		exit;
	}
	t_check_trans();

	record_route();
	if (!t_newtran()) {
		sl_reply_error();
		exit;
	}
	route(CGR_AUTH);
	exit;
}

# park the INVITE while cgrates authorizes and picks routes
route[CGR_AUTH] {
	evapi_async_relay("{\"event\":\"CGR_AUTH_REQUEST\",
		\"trIndex\":\"$T(id_index)\",
		\"trLabel\":\"$T(id_label)\",
		\"replyRoute\":\"CGR_AUTH_REPLY\",
		\"*attributes\":\"true\",
		\"*routes\":\"true\",
		\"OriginID\":\"$ci\",
		\"Account\":\"$fU\",
		\"Destination\":\"$rU\"}");
}

route[CGR_AUTH_REPLY] {
	json_get_field("$evapi(msg)", "TransactionIndex", "$var(idx)");
	json_get_field("$evapi(msg)", "TransactionLabel", "$var(lbl)");
	json_get_field("$evapi(msg)", "Routes", "$var(rts)");
	json_get_field("$evapi(msg)", "Error", "$var(err)");

	$var(idx) = $(var(idx){s.rm,"}{s.int});
	$var(lbl) = $(var(lbl){s.rm,"}{s.int});
	$var(rts) = $(var(rts){s.rm,"});
	$var(err) = $(var(err){s.rm,"});

	t_continue("$var(idx)", "$var(lbl)", "RESUME_INVITE");
}

# resumed by CGR_AUTH_REPLY via t_continue
route[RESUME_INVITE] {
	if ($var(err) != "") {
		sl_send_reply("503", "Charging error");
		exit;
	}
	if ($var(rts) == "") {
		sl_send_reply("503", "No route");
		exit;
	}

	$var(first)   = $(var(rts){s.select,0,,});
	$var(carrier) = $(var(first){s.select,0,:});
	$var(ratepf)  = $(var(first){s.select,1,:});

	if (!cr_route("default", "$var(carrier)", "$rU", "$rU", "call_id")) {
		sl_send_reply("503", "Carrier routing failed");
		exit;
	}

	dlg_manage();
	$dlg_var(originID) = $ci;
	$dlg_var(account)  = $fU;
	$dlg_var(dest)     = $rU;
	$dlg_var(ratepf)   = $var(ratepf);
	$dlg_var(trIdx)    = $T(id_index);
	$dlg_var(trLbl)    = $T(id_label);

	route(RELAY);
}

route[RELAY] {
	if (!t_relay()) {
		sl_reply_error();
	}
}

# fired by dialog:end, sends a CDR with both customer and vendor cost
route[CGR_PROCESS_CDR] {
	$var(dur) = $TS - $dlg(start_ts);
	evapi_relay("{\"event\":\"CGR_PROCESS_CDR\",
		\"replyRoute\":\"CGR_CDR_REPLY\",
		\"trIndex\":\"$dlg_var(trIdx)\",
		\"trLabel\":\"$dlg_var(trLbl)\",
		\"*attributes\":\"true\",
		\"*cdrs\":\"true\",
		\"*accounts\":\"true\",
		\"OriginID\":\"$dlg_var(originID)\",
		\"Usage\":\"$var(dur)\",
		\"RateProfileID\":\"$dlg_var(ratepf)\",
		\"Account\":\"$dlg_var(account)\",
		\"Destination\":\"$dlg_var(dest)\",
		\"AnswerTime\":\"$dlg(start_ts)\"}");
}

route[CGR_CDR_REPLY] {
	return;
}
